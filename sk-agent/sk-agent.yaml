apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-services
  labels:
    helm.sh/chart: rag-services-0.1.0
    app.kubernetes.io/name: rag-services
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    layer: platform-services
    language: java
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-services
      app.kubernetes.io/instance: release-name
      app: rag-services
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-services
        app.kubernetes.io/instance: release-name
        app: rag-services
        layer: platform-services
    spec:
      
      imagePullSecrets:
        - name: registry-secret
      serviceAccountName: sk-agent-account
      securityContext:
        null
      containers:
        - name: rag-services
          image: "registry.example.com/sk-agent/rag-services:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: JAVA_OPTS
              value: -Xms512m -Xmx1g
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
