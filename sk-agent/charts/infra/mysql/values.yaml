image:
  repository: mysql
  tag: "8.0"
  pullPolicy: IfNotPresent
  amd64Image: mysql:8.0
  arm64Image: mysql:8.0

database: sk_agent
user: sk_agent
password: ""

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  hostPath: /data/mysql
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 3306

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

securityContext:
  fsGroup: 999
  runAsUser: 999
  runAsGroup: 999
  runAsNonRoot: true

podSecurityContext:
  fsGroup: 999
  runAsUser: 999
  runAsGroup: 999
  runAsNonRoot: true

probes:
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

config:
  max_connections: 200
  innodb_buffer_pool_size: 256M
  character_set_server: utf8mb4
  collation_server: utf8mb4_unicode_ci

nodeSelector: {}

tolerations: []

affinity: {}
