# ==============================================================================
# SK Agent Microservices Architecture - Parent Chart Configuration
# Version 3: 折中方案 - 保留子Chart结构 + 复用公共模板
# ==============================================================================

# Global settings
global:
  environment: dev
  architecture: amd64
  imagePullSecrets:
    - name: registry-secret
  storageClass: "manual-sc"
  serviceAccount:
    create: true
    name: "sk-agent-account"
  domain: "cluster.local"

# Private Registry
registry:
  enabled: true
  server: "registry.example.com"
  username: ""
  password: ""
  email: ""


# ==============================================================================
# Global Settings
# ==============================================================================
nodeSelector:
  kubernetes.io/arch: "amd64"

tolerations: []

affinity: {}

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

podAnnotations: {}

podLabels: {}

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sk-agent.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sk-agent-tls
      hosts:
        - sk-agent.local