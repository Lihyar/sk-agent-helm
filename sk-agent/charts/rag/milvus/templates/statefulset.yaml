apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "milvus.fullname" . }}
  labels:
    {{- include "milvus.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "milvus.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "milvus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "milvus.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        fsGroup: {{ .fsGroup }}
        runAsUser: {{ .runAsUser }}
        runAsGroup: {{ .runAsGroup }}
        runAsNonRoot: {{ .runAsNonRoot }}
      {{- end }}
      initContainers:
        - name: init-milvus
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - bash
            - "-c"
            - |
              set -ex
              mkdir -p /var/lib/milvus /var/log/milvus
              chown -R 1000:1000 /var/lib/milvus /var/log/milvus
          {{- with .Values.securityContext }}
          securityContext:
            runAsUser: {{ .runAsUser }}
            runAsGroup: {{ .runAsGroup }}
            runAsNonRoot: {{ .runAsNonRoot }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
            - name: log
              mountPath: /var/log/milvus
      containers:
        - name: milvus
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: milvus
              containerPort: 19530
              protocol: TCP
            - name: grpc
              containerPort: 19531
              protocol: TCP
          env:
            - name: ETCD_ENDPOINTS
              value: "etcd:2379"
            - name: MINIO_ADDRESS
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY_ID
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_SECRET_ACCESS_KEY
              value: {{ .Values.minio.rootPassword | quote }}
          livenessProbe:
            tcpSocket:
              port: 19530
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: 19530
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- with .Values.resources }}
          resources:
            requests:
              cpu: {{ .requests.cpu }}
              memory: {{ .requests.memory }}
            limits:
              cpu: {{ .limits.cpu }}
              memory: {{ .limits.memory }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /milvus/configs
              readOnly: true
            - name: data
              mountPath: /var/lib/milvus
            - name: log
              mountPath: /var/log/milvus
      volumes:
        - name: config
          configMap:
            name: {{ include "milvus.fullname" . }}
        - name: log
          emptyDir: {}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | default "ReadWriteOnce" }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | default "50Gi" }}
  {{- end }}
