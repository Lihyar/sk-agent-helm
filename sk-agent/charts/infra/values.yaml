# ==============================================================================
# Infrastructure Layer - 子Chart配置 (infra-*)
# ==============================================================================
infra-mysql:
  enabled: true
  name: mysql
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  database: skagent
  user: skuser
  password: "mysql123"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/mysql"
  service:
    type: ClusterIP
    port: 3306
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

infra-redis:
  enabled: true
  name: redis
  image:
    repository: redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  password: "redis123"
  persistence:
    enabled: true
    size: 2Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/redis"
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

infra-rabbitmq:
  enabled: true
  name: rabbitmq
  image:
    repository: rabbitmq
    tag: "3.13-management"
    pullPolicy: IfNotPresent
  user: admin
  password: "rabbitmq123"
  persistence:
    enabled: true
    size: 8Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/rabbitmq"
  service:
    type: ClusterIP
    port: 5672
    managementPort: 15672
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

infra-minio:
  enabled: true
  name: minio
  image:
    repository: minio/minio
    tag: "latest"
    pullPolicy: IfNotPresent
  accessKey: "minioadmin"
  secretKey: "minioadmin123"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/minio"
  service:
    type: ClusterIP
    port: 9000
    consolePort: 9001
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
