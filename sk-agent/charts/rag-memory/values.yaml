name: memory
image:
  repository: registry.example.com/sk-agent/memory
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 8080
volumes:
  - name: data
    mountPath: /data
    size: 5Gi
    storageClass: manual-sc
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi
