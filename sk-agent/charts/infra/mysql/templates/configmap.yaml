apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mysql.fullname" . }}
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
data:
  my.cnf: |
    [client]
    port = 3306
    
    [mysql]
    no-auto-rehash
    socket = /var/run/mysqld/mysqld.sock
    
    [mysqld]
    port = 3306
    socket = /var/run/mysqld/mysqld.sock
    datadir = /var/lib/mysql
    pid-file = /var/run/mysqld/mysqld.pid
    
    # Character set
    character-set-server = {{ .Values.config.character_set_server | default "utf8mb4" }}
    collation-server = {{ .Values.config.collation_server | default "utf8mb4_unicode_ci" }}
    
    # Connection settings
    max_connections = {{ .Values.config.max_connections | default 200 }}
    
    # InnoDB settings
    innodb_buffer_pool_size = {{ .Values.config.innodb_buffer_pool_size | default "256M" }}
    innodb_file_per_table = 1
    innodb_flush_log_at_trx_commit = 1
    innodb_flush_method = O_DIRECT
    
    # Logging
    log_error = /var/log/mysql/error.log
    slow_query_log = 1
    slow_query_log_file = /var/log/mysql/slow.log
    long_query_time = 2
    
    # Binary logging
    log_bin = mysql-bin
    binlog_format = ROW
    expire_logs_days = 7
