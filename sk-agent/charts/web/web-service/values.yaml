image:
  repository: registry.example.com/sk-agent/web-service
  tag: "latest"
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 512Mi

env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "3000"

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

nodeSelector: {}

tolerations: []

affinity: {}
