image:
  repository: python
  tag: "3.11-slim"
  pullPolicy: IfNotPresent

command: ["python"]
args: ["-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: []

nodeSelector: {}

tolerations: []

affinity: {}

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  runAsNonRoot: true

podAnnotations: {}

podLabels: {}

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

serviceAccount:
  create: false
  annotations: {}
  name: ""

extraVolumes: []
extraVolumeMounts: []
