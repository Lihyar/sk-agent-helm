apiVersion: v2
name: common-foundation
description: Common Foundation Layer - Common Services
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: user
    version: "0.1.0"
    condition: user.enabled
  - name: domain
    version: "0.1.0"
    condition: domain.enabled
  - name: etl
    version: "0.1.0"
    condition: etl.enabled
  - name: storage
    version: "0.1.0"
    condition: storage.enabled
  - name: notification
    version: "0.1.0"
    condition: notification.enabled
  - name: operation
    version: "0.1.0"
    condition: operation.enabled

keywords:
  - sk-agent
  - common-foundation

maintainers:
  - name: SK Agent Team
    email: team@example.com
