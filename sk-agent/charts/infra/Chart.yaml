apiVersion: v2
name: sk-agent-middleware
description: SK Agent middleware Architecture - Parent Chart
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: infra-mysql
    version: "0.1.0"
    condition: infra-mysql.enabled
  - name: infra-redis
    version: "0.1.0"
    condition: infra-redis.enabled
  - name: infra-rabbitmq
    version: "0.1.0"
    condition: infra-rabbitmq.enabled
  - name: infra-minio
    version: "0.1.0"
    condition: infra-minio.enabled
  
keywords:
  - microservices
  - sk-agent
  - kubernetes
  - k3s
home: https://github.com/your-org/sk-agent
sources:
  - https://github.com/your-org/sk-agent
maintainers:
  - name: SK Agent Team
    email: team@example.com