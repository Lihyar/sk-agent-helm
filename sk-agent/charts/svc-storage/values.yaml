name: storage
image:
  repository: registry.example.com/sk-agent/storage
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8080
replicas: 1
javaOpts: "-Xms512m -Xmx1g -Xmn256m"
config:
  spring:
    application:
      name: storage-service
    datasource:
      url: jdbc:mysql://mysql:3306/skagent
      username: skuser
      password: mysql123
    redis:
      host: redis
      port: 6379
  server:
    port: 8080
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi
