    name: agent-task
    image:
      repository: registry.example.com/sk-agent/agent
      tag: "latest"
    command: ["python", "-m", "agent.task"]
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  
  operation:
    enabled: true
    name: operation
    image:
      repository: registry.example.com/sk-agent/operation
      tag: "latest"
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
  
  storage:
    enabled: true
    name: storage
    image:
      repository: registry.example.com/sk-agent/storage
      tag: "latest"
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
  
  etl:
