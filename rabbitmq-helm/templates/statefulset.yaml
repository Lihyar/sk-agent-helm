apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rabbitmq.fullname" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "rabbitmq.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "rabbitmq.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rabbitmq.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "rabbitmq.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: init-permissions
          image: "busybox:1.36"
          command:
            - sh
            - -c
            - |
              chown -R 999:999 /var/lib/rabbitmq && chmod -R 755 /var/lib/rabbitmq
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      containers:
        - name: rabbitmq
          image: "{{ .Values.rabbitmq.image.repository }}:{{ .Values.rabbitmq.image.tag }}"
          imagePullPolicy: {{ .Values.rabbitmq.image.pullPolicy }}
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{ .Values.rabbitmq.user }}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "rabbitmq.fullname" . }}-secret
                  key: rabbitmq-password
            - name: RABBITMQ_DEFAULT_VHOST
              value: "/"
            - name: RABBITMQ_ERL_COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ include "rabbitmq.fullname" . }}-secret
                  key: rabbitmq-erlang-cookie
          {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            # - name: config
            #   mountPath: /etc/rabbitmq
            # - name: definitions
            #   mountPath: /etc/rabbitmq/definitions.json
            #   subPath: definitions.json
          livenessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default (30) }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default (10) }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default (5) }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default (3) }}
          readinessProbe:
            httpGet:
              path: /
              port: management
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default (10) }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default (5) }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default (5) }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default (3) }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      # volumes:
      #   - name: config
      #     configMap:
      #       name: {{ include "rabbitmq.fullname" . }}-config
      #       items:
      #         - key: rabbitmq.conf
      #           path: rabbitmq.conf
      #   - name: definitions
      #     configMap:
      #       name: {{ include "rabbitmq.fullname" . }}-config
      #       items:
      #         - key: definitions.json
      #           path: definitions.json
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        storageClassName: ""
        selector:
          matchLabels:
            "rabbitmq-pv": {{ include "rabbitmq.fullname" . }}-pv
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
