# 仅安装mysql
# Global settings
global:
  environment: dev
  architecture: amd64
  imagePullSecrets:
    - name: registry-secret
  storageClass: "local-path"
  serviceAccount:
    create: false
    name: "default"
  database: mysql

registry:
  enabled: false  # 禁用自动创建 Secret

middleware:
  enabled: true
data-foundation:
  enabled: false
model-foundation:
  enabled: false
common-foundation:
  enabled: false
medical-brain:
  enabled: false
biz-foundation:
  enabled: false
gateway:
  enabled: false
