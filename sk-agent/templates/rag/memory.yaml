{{- if and .Values.rag.enabled .Values.rag.memory.enabled -}}
{{- $svc := .Values.rag.memory -}}
{{- $fullName := printf "%s-memory" (include "sk-agent.fullname" .) -}}
{{- $arch := .Values.global.architecture | default "amd64" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-secret
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
type: Opaque
data:
  mysql-password: {{ $svc.mysql.password | default "memory123" | b64enc | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
    component: memory
spec:
  serviceName: {{ $fullName }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "sk-agent.selectorLabels" . | nindent 6 }}
      app: memory
  template:
    metadata:
      labels:
        {{- include "sk-agent.selectorLabels" . | nindent 8 }}
        app: memory
    spec:
      {{- include "sk-agent.imagePullSecret" . | nindent 6 }}
      serviceAccountName: {{ include "sk-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: init-permissions
          image: "busybox:1.36"
          command:
            - sh
            - -c
            - |
              chown -R 999:999 /data && chmod -R 755 /data
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: memory
          {{- if eq $arch "arm64" }}
          image: "{{ $svc.image.repository | default "arm64v8/mysql" }}:{{ $svc.image.tag | default "8.0" }}"
          {{- else }}
          image: "{{ $svc.image.repository | default "mysql" }}:{{ $svc.image.tag | default "8.0" }}"
          {{- end }}
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secret
                  key: mysql-password
            - name: MYSQL_DATABASE
              value: {{ $svc.mysql.database | default "memory" }}
            - name: MYSQL_USER
              value: {{ $svc.mysql.user | default "memoryuser" }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secret
                  key: mysql-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mysql", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD", "-e", "SELECT 1"]
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $fullName }}-config
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if $svc.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ $svc.persistence.accessMode | default "ReadWriteOnce" }}
        storageClassName: {{ $svc.persistence.storageClass | default "manual-sc" }}
        resources:
          requests:
            storage: {{ $svc.persistence.size | default "5Gi" }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-config
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
data:
  custom.cnf: |
    [mysqld]
    max_connections = 500
    innodb_buffer_pool_size = 512M
    character-set-server = utf8mb4
    collation-server = utf8mb4_unicode_ci
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    app: memory
{{- end }}
