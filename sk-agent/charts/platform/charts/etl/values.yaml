name: etl
image:
  repository: registry.example.com/sk-agent/etl
  tag: latest
  pullPolicy: IfNotPresent
command:
  - python
  - -m
  - etl.service
service:
  type: ClusterIP
  port: 8080
replicas: 1
config:
  mysql:
    host: mysql
    port: 3306
    database: skagent
  redis:
    host: redis
    port: 6379
  rabbitmq:
    host: rabbitmq
    port: 5672
env:
  - name: PYTHON_ENV
    value: dev
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi
