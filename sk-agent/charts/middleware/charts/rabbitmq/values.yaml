name: rabbitmq
image:
  repository: saascr.shukun.net/ghc/backend/sk-rabbitmq
  tag: 3.7.14
  pullPolicy: IfNotPresent

service:
  serviceType: NodePort
  port: 15672
  nodePort: 30300

env:
  - name: RABBITMQ_DEFAULT_USER
    value: admin
  - name: RABBITMQ_DEFAULT_PASS
    value: rabbitmq123
volumes:
  - name: data
    mountPath: /var/lib/rabbitmq
    size: 8Gi
    storageClass: local-path
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi
