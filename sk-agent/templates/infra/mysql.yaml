{{- if and .Values.infra.enabled .Values.infra.mysql.enabled -}}
{{- $svc := .Values.infra.mysql -}}
{{- $fullName := printf "%s-mysql" (include "sk-agent.fullname" .) -}}
{{- $arch := .Values.global.architecture | default "amd64" -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
    component: mysql
spec:
  serviceName: {{ $fullName }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "sk-agent.selectorLabels" . | nindent 6 }}
      app: mysql
  template:
    metadata:
      labels:
        {{- include "sk-agent.selectorLabels" . | nindent 8 }}
        app: mysql
    spec:
      {{- include "sk-agent.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sk-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: init-permissions
          image: "busybox:1.36"
          command:
            - sh
            - -c
            - |
              chown -R 999:999 /var/lib/mysql && chmod -R 755 /var/lib/mysql
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      containers:
        - name: mysql
          {{- if eq $arch "arm64" }}
          image: "arm64v8/mysql:{{ $svc.image.tag | default "8.0" }}"
          {{- else }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag | default "8.0" }}"
          {{- end }}
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: {{ $svc.database | default "skagent" }}
            - name: MYSQL_USER
              value: {{ $svc.user | default "skuser" }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secret
                  key: mysql-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mysql", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD", "-e", "SELECT 1"]
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $fullName }}-config
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if $svc.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ $svc.persistence.accessMode | default "ReadWriteOnce" }}
        storageClassName: {{ $svc.persistence.storageClass | default "manual-sc" }}
        resources:
          requests:
            storage: {{ $svc.persistence.size | default "10Gi" }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
spec:
  type: {{ $svc.service.type | default "ClusterIP" }}
  ports:
    - port: 3306
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    app: mysql
---
{{- end }}
