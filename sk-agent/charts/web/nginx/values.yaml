image:
  repository: nginx
  tag: "alpine"
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: LoadBalancer
  port: 80

upstream:
  app-web:
    host: "app-web"
    port: 3000
  hospital-web:
    host: "hospital-web"
    port: 3000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  runAsUser: 101
  runAsGroup: 101
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

podSecurityContext:
  runAsUser: 101
  runAsGroup: 101
  runAsNonRoot: true

nodeSelector: {}

tolerations: []

affinity: {}

config: |
  upstream app-web {
    server {{ .Values.upstream.app-web.host }}:{{ .Values.upstream.app-web.port }};
  }

  upstream hospital-web {
    server {{ .Values.upstream.hospital-web.host }}:{{ .Values.upstream.hospital-web.port }};
  }

  server {
    listen 80;
    server_name localhost;

    location / {
      proxy_pass http://app-web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://app-web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /hospital/ {
      proxy_pass http://hospital-web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }