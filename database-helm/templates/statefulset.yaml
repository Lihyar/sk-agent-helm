apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "database.fullname" . }}
  labels:
    {{- include "database.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "database.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "database.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "database.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "database.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Values.database.type }}
          {{- if eq .Values.database.type "mysql" }}
          image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"
          {{- else }}
          image: "{{ .Values.kingbase.image.repository }}:{{ .Values.kingbase.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}
          ports:
            - name: {{ .Values.database.type }}
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: DATABASE_TYPE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "database.fullname" . }}-config
                  key: database-type
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "database.fullname" . }}-config
                  key: database-name
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "database.fullname" . }}-config
                  key: database-user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "database.fullname" . }}-secret
                  key: database-password
          {{- if eq .Values.database.type "mysql" }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "database.fullname" . }}-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "database.fullname" . }}-config
                  key: database-name
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "database.fullname" . }}-config
                  key: database-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "database.fullname" . }}-secret
                  key: database-password
          {{- else if eq .Values.database.type "kingbase" }}
            - name: KINGBASE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "database.fullname" . }}-config
                  key: database-name
            - name: KINGBASE_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "database.fullname" . }}-config
                  key: database-user
            - name: KINGBASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "database.fullname" . }}-secret
                  key: database-password
          {{- end }}
          {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ if eq .Values.database.type "mysql" }}/var/lib/mysql{{ else }}/data{{ end }}
            - name: config
              mountPath: /etc/database/config
            {{- if .Values.database.sslEnabled }}
            - name: ssl-certs
              mountPath: {{ if eq .Values.database.type "mysql" }}/etc/mysql/ssl{{ else }}/etc/kingbase/ssl{{ end }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- if eq .Values.database.type "mysql" }}
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            {{- else }}
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -p
                - "54321"
            {{- end }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default (30) }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default (10) }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default (5) }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default (3) }}
          readinessProbe:
            {{- if eq .Values.database.type "mysql" }}
            exec:
              command:
                - /bin/sh
                - -c
                - "echo $MYSQL_ROOT_PASSWORD && mysql -h localhost -u root -p$MYSQL_ROOT_PASSWORD -e 'SELECT 1'"
            {{- else }}
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -p
                - "54321"
            {{- end }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default (10) }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default (5) }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default (5) }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default (3) }}
          resources:
            {{- if .Values.customResources }}
            {{- if eq .Values.database.type "mysql" }}
            {{- toYaml .Values.customResources.mysql | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.customResources.kingbase | nindent 12 }}
            {{- end }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "database.fullname" . }}-config
        {{- if .Values.database.sslEnabled }}
        - name: ssl-certs
          secret:
            secretName: {{ include "database.fullname" . }}-secret
            items:
              {{- if .Values.database.ssl.caCert }}
              - key: ssl-ca-cert
                path: ca.pem
              {{- end }}
              {{- if .Values.database.ssl.serverCert }}
              - key: ssl-server-cert
                path: server-cert.pem
              {{- end }}
              {{- if .Values.database.ssl.serverKey }}
              - key: ssl-server-key
                path: server-key.pem
              {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
