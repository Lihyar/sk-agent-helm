{{- if and .Values.infra.enabled .Values.infra.rabbitmq.enabled -}}
{{- $svc := .Values.infra.rabbitmq -}}
{{- $fullName := printf "%s-rabbitmq" (include "sk-agent.fullname" .) -}}
{{- $arch := .Values.global.architecture | default "amd64" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-secret
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
type: Opaque
data:
  rabbitmq-username: {{ $svc.user | b64enc | quote }}
  rabbitmq-password: {{ $svc.password | b64enc | quote }}
  rabbitmq-erlang-cookie: {{ randAlpha 32 | b64enc | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-config
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
data:
  rabbitmq.conf: |
    loopback_users.guest = false
    listeners.tcp.default = 5672
    management.tcp.port = 15672
    management.load_definitions = /etc/rabbitmq/definitions.json
  definitions.json: |
    {
      "rabbitmq": {
        "username": "{{ $svc.user }}",
        "password": "{{ $svc.password }}"
      }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
    component: rabbitmq
spec:
  serviceName: {{ $fullName }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "sk-agent.selectorLabels" . | nindent 6 }}
      app: rabbitmq
  template:
    metadata:
      labels:
        {{- include "sk-agent.selectorLabels" . | nindent 8 }}
        app: rabbitmq
    spec:
      {{- include "sk-agent.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sk-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: rabbitmq
          {{- if eq $arch "arm64" }}
          image: "arm64v8/rabbitmq:{{ $svc.image.tag | default "3.12-management-alpine" }}"
          {{- else }}
          image: "{{ $svc.image.repository | default "rabbitmq" }}:{{ $svc.image.tag | default "3.12-management-alpine" }}"
          {{- end }}
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{ $svc.user | quote }}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secret
                  key: rabbitmq-password
            - name: RABBITMQ_ERL_COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secret
                  key: rabbitmq-erlang-cookie
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: config
              mountPath: /etc/rabbitmq
          livenessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $fullName }}-config
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if $svc.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ $svc.persistence.accessMode | default "ReadWriteOnce" }}
        storageClassName: {{ $svc.persistence.storageClass | default "manual-sc" }}
        resources:
          requests:
            storage: {{ $svc.persistence.size | default "8Gi" }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
spec:
  type: {{ $svc.service.type | default "ClusterIP" }}
  ports:
    - port: {{ $svc.service.port | default 5672 }}
      targetPort: amqp
      protocol: TCP
      name: amqp
    - port: {{ $svc.service.managementPort | default 15672 }}
      targetPort: management
      protocol: TCP
      name: management
  selector:
    app: rabbitmq
{{- end }}