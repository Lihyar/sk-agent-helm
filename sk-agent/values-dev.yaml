# Development Environment Configuration
# Usage: helm install sk-agent-dev sk-agent -f values-dev.yaml

global:
  environment: dev
  architecture: amd64
  storageClass: "manual-sc"
  imagePullSecrets:
    - name: registry-secret
  serviceAccount:
    create: true
    name: "sk-agent-account"

registry:
  enabled: true
  server: "registry.example.com"
  username: ""
  password: ""

# ==============================================================================
# Infrastructure Layer - 开发环境覆盖配置
# ==============================================================================

infra-mysql:
  enabled: true
  persistence:
    size: 5Gi
    hostPath: "/tmp/volumes/mysql-dev"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

infra-redis:
  enabled: true
  persistence:
    size: 1Gi
    hostPath: "/tmp/volumes/redis-dev"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

infra-rabbitmq:
  enabled: true
  persistence:
    size: 4Gi
    hostPath: "/tmp/volumes/rabbitmq-dev"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

infra-minio:
  enabled: true
  persistence:
    size: 10Gi
    hostPath: "/tmp/volumes/minio-dev"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ==============================================================================
# RAG Layer - 开发环境覆盖配置
# ==============================================================================

rag-memory:
  enabled: true

rag-milvus:
  enabled: true

rag-services:
  enabled: true

# ==============================================================================
# Platform Services Layer - 开发环境覆盖配置
# ==============================================================================

svc-user:
  enabled: true
svc-domain:
  enabled: true
svc-scheduler:
  enabled: true
svc-agent:
  enabled: true
svc-operation:
  enabled: true
svc-storage:
  enabled: true
svc-etl:
  enabled: true
svc-assessment:
  enabled: true
svc-hospital:
  enabled: true
svc-tcm:
  enabled: true
svc-notification:
  enabled: true
svc-customer:
  enabled: true
svc-dashboard:
  enabled: true
svc-manager:
  enabled: true

# ==============================================================================
# Web Layer - 开发环境覆盖配置
# ==============================================================================

web-app:
  enabled: true
  replicas: 1

web-hospital:
  enabled: true
  replicas: 1

web-nginx:
  enabled: true
  replicas: 1
  service:
    type: NodePort
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - host: sk-agent-dev.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ==============================================================================
# Ingress Configuration
# ==============================================================================

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: sk-agent-dev.local
      paths:
        - path: /
          pathType: Prefix