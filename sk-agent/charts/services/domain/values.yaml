image:
  repository: registry.example.com/sk-agent/domain
  tag: "latest"
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "default"
  - name: JAVA_OPTS
    value: "-Xmx1g -Xms512m"

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

nodeSelector: {}

tolerations: []

affinity: {}