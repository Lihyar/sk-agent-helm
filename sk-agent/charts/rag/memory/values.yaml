image:
  repository: registry.example.com/sk-agent/memory
  tag: "latest"
  pullPolicy: IfNotPresent

replicas: 1

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  hostPath: /data/memory
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

securityContext:
  runAsUser: 999
  runAsGroup: 999
  runAsNonRoot: true

podSecurityContext:
  runAsUser: 999
  runAsGroup: 999
  runAsNonRoot: true

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}