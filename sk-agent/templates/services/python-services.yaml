{{- if and .Values.services.enabled (or .Values.services.agent.enabled .Values.services.agentTask.enabled .Values.services.etl.enabled .Values.services.etlListener.enabled .Values.services.etlBeat.enabled) -}}

# Agent Service
{{- if .Values.services.agent.enabled }}
{{- $svc := .Values.services.agent }}
{{- $env := list 
  (dict "name" "REDIS_HOST" "value" "sk-agent-redis")
  (dict "name" "MYSQL_HOST" "value" "sk-agent-mysql")
  (dict "name" "RABBITMQ_HOST" "value" "sk-agent-rabbitmq")
}}
{{- include "python.deployment" (dict "root" . "serviceName" "agent" "image" $svc.image "port" ($svc.service.port | default 8080) "resources" $svc.resources "env" $env) -}}
{{- end }}

# Agent Task Service (same image as agent, different command)
{{- if .Values.services.agentTask.enabled }}
{{- $svc := .Values.services.agentTask }}
{{- $cmd := list "python" "-m" "agent.task" }}
{{- $env := list 
  (dict "name" "SCHEDULER_HOST" "value" "sk-agent-scheduler")
}}
{{- include "python.deployment" (dict "root" . "serviceName" "agent-task" "image" $svc.image "port" ($svc.service.port | default 8080) "resources" $svc.resources "command" $cmd "env" $env) -}}
{{- end }}

# ETL Service
{{- if .Values.services.etl.enabled }}
{{- $svc := .Values.services.etl }}
{{- $cmd := list "python" "-m" "etl.service" }}
{{- $env := list 
  (dict "name" "SCHEDULER_HOST" "value" "sk-agent-scheduler")
  (dict "name" "REDIS_HOST" "value" "sk-agent-redis")
}}
{{- include "python.deployment" (dict "root" . "serviceName" "etl" "image" $svc.image "port" ($svc.service.port | default 8080) "resources" $svc.resources "command" $cmd "env" $env) -}}
{{- end }}

# ETL Listener Service (same image as etl, different command)
{{- if .Values.services.etlListener.enabled }}
{{- $svc := .Values.services.etlListener }}
{{- $cmd := list "python" "-m" "etl.listener" }}
{{- $env := list 
  (dict "name" "RABBITMQ_HOST" "value" "sk-agent-rabbitmq")
}}
{{- include "python.deployment" (dict "root" . "serviceName" "etl-listener" "image" $svc.image "port" ($svc.service.port | default 8080) "resources" $svc.resources "command" $cmd "env" $env) -}}
{{- end }}

# ETL Beat Service (same image as etl, different command - scheduler)
{{- if .Values.services.etlBeat.enabled }}
{{- $svc := .Values.services.etlBeat }}
{{- $cmd := list "python" "-m" "etl.beat" }}
{{- $env := list 
  (dict "name" "USER_HOST" "value" "sk-agent-user")
  (dict "name" "DOMAIN_HOST" "value" "sk-agent-domain")
  (dict "name" "OPERATION_HOST" "value" "sk-agent-operation")
}}
{{- include "python.deployment" (dict "root" . "serviceName" "etl-beat" "image" $svc.image "port" 8080 "resources" $svc.resources "command" $cmd "env" $env) -}}
{{- end }}

{{- end }}
