# SK Agent Microservices Architecture - Global Configuration
# This is the parent Helm chart for the entire microservices platform

# Global settings
global:
  # Environment: dev, pre, prod
  environment: dev
  
  # Architecture: amd64, arm64
  architecture: amd64
  
  # Image pull secrets for private registry
  imagePullSecrets:
    - name: registry-secret
  
  # StorageClass
  storageClass: "manual-sc"
  
  # Service account
  serviceAccount:
    create: true
    name: "sk-agent-account"
    annotations: {}
  
  # DNS settings
  domain: "cluster.local"

# Private Registry Configuration
registry:
  enabled: true
  server: "registry.example.com"
  username: ""
  password: ""
  email: ""
  
# Infra Layer Configuration
infra:
  enabled: true
  
  mysql:
    enabled: true
    name: mysql
    image:
      repository: mysql
      tag: "8.0"
      pullPolicy: IfNotPresent
    database: skagent
    user: skuser
    password: "mysql123"
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "manual-sc"
      hostPath: "/tmp/volumes/mysql"
    service:
      type: ClusterIP
      port: 3306
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  
  redis:
    enabled: true
    name: redis
    image:
      repository: redis
      tag: "7.2-alpine"
      pullPolicy: IfNotPresent
    mode: standalone
    password: "redis123"
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "manual-sc"
      hostPath: "/tmp/volumes/redis"
    service:
      type: ClusterIP
      port: 6379
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  
  rabbitmq:
    enabled: true
    name: rabbitmq
    image:
      repository: rabbitmq
      tag: "3.13-management"
      pullPolicy: IfNotPresent
    user: admin
    password: "rabbitmq123"
    persistence:
      enabled: true
      size: 8Gi
      storageClass: "manual-sc"
      hostPath: "/tmp/volumes/rabbitmq"
    service:
      type: ClusterIP
      port: 5672
      managementPort: 15672
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  
  minio:
    enabled: true
    name: minio
    image:
      repository: minio/minio
      tag: "latest"
      pullPolicy: IfNotPresent
    accessKey: "minioadmin"
    secretKey: "minioadmin123"
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "manual-sc"
      hostPath: "/tmp/volumes/minio"
    service:
      type: ClusterIP
      port: 9000
      consolePort: 9001
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

# RAG Layer Configuration
rag:
  enabled: true
  
  memory:
    enabled: true
    name: memory
    image:
      repository: registry.example.com/sk-agent/memory
      tag: "latest"
    mysql:
      database: "memory"
      user: "memoryuser"
      password: "memory123"
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "manual-sc"
      hostPath: "/tmp/volumes/memory"
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  
  milvus:
    enabled: true
    name: milvus
    image:
      repository: milvusdb/milvus
      tag: "v2.3.3"
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "manual-sc"
    etcd:
      enabled: true
      persistence:
        size: 2Gi
    minio:
      enabled: true
      persistence:
        size: 10Gi
    service:
      type: ClusterIP
      port: 19530
    resources:
      requests:
        cpu: 1000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 16Gi
  
  ragServices:
    enabled: true
    name: rag-services
    image:
      repository: registry.example.com/sk-agent/rag-services
      tag: "latest"
    mysql:
      database: "rag"
      user: "raguser"
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

# Platform Services Layer Configuration
services:
  enabled: true
  
  # Init Data - One-time Job
  initData:
    enabled: true
    name: init-data
    image:
      repository: registry.example.com/sk-agent/init-data
      tag: "latest"
    # Run policy: Never, Always, IfNotPresent, OnFailure
    restartPolicy: OnFailure
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  
  user:
    enabled: true
    name: user
    image:
      repository: registry.example.com/sk-agent/user
      tag: "latest"
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
  
  domain:
    enabled: true
    name: domain
    image:
      repository: registry.example.com/sk-agent/domain
      tag: "latest"
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
  
  scheduler:
    enabled: true
    name: scheduler
    image:
      repository: registry.example.com/sk-agent/scheduler
      tag: "latest"
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
