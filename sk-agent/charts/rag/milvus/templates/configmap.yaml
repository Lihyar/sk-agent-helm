apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "milvus.fullname" . }}
  labels:
    {{- include "milvus.labels" . | nindent 4 }}
data:
  milvus.yaml: |
    etcd:
      endpoints:
        - etcd:2379
      rootPath: by-dev
      metaSubPath: meta
      kvSubPath: kv
    minio:
      address: minio:9000
      useSSL: false
      accessKeyID: minioadmin
      secretAccessKey: minioadmin
    storage:
      type: minio
    log:
      level: {{ .Values.config.log.level | default "info" }}
      format: {{ .Values.config.log.format | default "text" }}
    dataCoord:
      address: localhost
      port: 13333
    queryCoord:
      address: localhost
      port: 19531
    dataNode:
      port: 21124
    queryNode:
      port: 21123
    indexNode:
      port: 21121
    indexCoord:
      port: 31000
    rootCoord:
      port: 53100
    proxy:
      port: 19530
      http:
        enabled: true
        port: 19531
