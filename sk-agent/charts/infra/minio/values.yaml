# MinIO Configuration
minio:
  image:
    repository: minio/minio
    tag: "latest"
    pullPolicy: IfNotPresent
  accessKey: "minioadmin"
  secretKey: "minioadmin123"

# Persistence Configuration
persistence:
  enabled: true
  storageClass: "manual-sc"
  size: 10Gi
  hostPath: "/Users/haiyan/Documents/SK_K8S/sk-agent-3/volumes/minio"
  accessMode: ReadWriteOnce

# Service Configuration
service:
  type: ClusterIP
  apiPort: 9000
  consolePort: 9001
  annotations: {}

# Resource Configuration
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Node selector
nodeSelector: {}

tolerations: []

affinity: {}

# Security Context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container Security Context
containerSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Health check configuration
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

# Environment variables (additional)
extraEnv: []

# Additional volumes
extraVolumes: []
extraVolumeMounts: []

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: "sk-agent-account"

# Ingress configuration (optional)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: minio.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Console ingress (optional)
consoleIngress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: minio-console.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
