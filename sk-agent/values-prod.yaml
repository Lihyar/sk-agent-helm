# Production Environment Configuration (V4)
# Usage: helm install sk-agent-prod sk-agent -f values-prod.yaml

global:
  environment: prod
  architecture: amd64
  database: mysql
  storageClass: "standard"
  imagePullSecrets:
    - name: registry-secret
  serviceAccount:
    create: true
    name: "sk-agent-account"

registry:
  enabled: true
  server: "saascr.shukun.net"
  username: ""
  password: ""

# ==============================================================================
# L2: Middleware Layer - Production settings with high resources
# ==============================================================================
middleware:
  enabled: true
  mysql:
    enabled: true
    persistence:
      size: 100Gi
      storageClass: "standard"
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  redis:
    enabled: true
    persistence:
      size: 20Gi
      storageClass: "standard"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  rabbitmq:
    enabled: true
    persistence:
      size: 50Gi
      storageClass: "standard"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  minio:
    enabled: true
    persistence:
      size: 500Gi
      storageClass: "standard"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

# ==============================================================================
# L2: Data Service Layer - Production settings
# ==============================================================================
data-service:
  enabled: true
  memory:
    enabled: true
    persistence:
      size: 50Gi
  milvus:
    enabled: true
    persistence:
      size: 200Gi
  rag-services:
    enabled: true

# ==============================================================================
# L2: Model Service Layer - Production settings
# ==============================================================================
model-service:
  enabled: false

# ==============================================================================
# L2: Common Service Layer - Production settings
# ==============================================================================
common-service:
  enabled: true
  user:
    enabled: true
    replicas: 2
  domain:
    enabled: true
    replicas: 2
  etl:
    enabled: true
    replicas: 2
  storage:
    enabled: true
    replicas: 2
  notification:
    enabled: true
    replicas: 2
  operation:
    enabled: true
    replicas: 2

# ==============================================================================
# L2: Medical Brain Layer - Production settings
# ==============================================================================
medical-brain:
  enabled: true
  agent:
    enabled: true
    replicas: 3
  agent-task:
    enabled: true
    replicas: 2
  scheduler:
    enabled: true
    replicas: 2

# ==============================================================================
# L2: Business Service Layer - Production settings
# ==============================================================================
biz-service:
  enabled: true
  assessment:
    enabled: true
    replicas: 2
  dashboard:
    enabled: true
    replicas: 2
  hospital:
    enabled: true
    replicas: 2
  tcm:
    enabled: true
    replicas: 2
  customer:
    enabled: true
    replicas: 2

# ==============================================================================
# L2: Gateway Layer - Production settings
# ==============================================================================
gateway:
  enabled: true
  manager:
    enabled: true
    replicas: 3
  nginx:
    enabled: true
    replicas: 3
    service:
      type: LoadBalancer
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/proxy-body-size: "100m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
      hosts:
        - host: sk-agent.example.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: sk-agent-prod-tls
          hosts:
            - sk-agent.example.com
  app-web:
    enabled: true
    replicas: 3
  hospital-web:
    enabled: true
    replicas: 3

# ==============================================================================
# Global Settings
# ==============================================================================
nodeSelector:
  kubernetes.io/arch: "amd64"

# Pod anti-affinity for production
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - nginx
          topologyKey: kubernetes.io/hostname

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sk-agent.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sk-agent-prod-tls
      hosts:
        - sk-agent.example.com
