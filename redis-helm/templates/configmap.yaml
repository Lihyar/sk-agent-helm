apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.fullname" . }}-config
  labels:
    {{- include "redis.labels" . | nindent 4 }}
data:
  redis.conf: |
    # Redis configuration
    bind 0.0.0.0
    port 6379
    timeout 0
    tcp-keepalive 300
    
    # Persistence
    save 900 1
    save 300 10
    save 60 10000
    
    # Memory
    maxmemory {{ .Values.redisConfig.maxmemory }}
    maxmemory-policy {{ .Values.redisConfig.maxmemoryPolicy }}
    
    # Append only file
    appendonly {{ .Values.redisConfig.appendonly }}
    
    # Logging
    logfile ""
    
    # Databases
    databases {{ .Values.redis.database }}
