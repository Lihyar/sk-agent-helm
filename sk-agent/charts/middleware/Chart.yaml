apiVersion: v2
name: middleware
description: Middleware Layer - Database, Cache, Message Queue, Object Storage
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: database
    version: "0.1.0"
    condition: database.enabled
  - name: redis
    version: "0.1.0"
    condition: redis.enabled
  - name: rabbitmq
    version: "0.1.0"
    condition: rabbitmq.enabled
  - name: minio
    version: "0.1.0"
    condition: minio.enabled

keywords:
  - middleware
  - sk-agent
  - kubernetes
  - k3s

maintainers:
  - name: SK Agent Team
    email: team@example.com
