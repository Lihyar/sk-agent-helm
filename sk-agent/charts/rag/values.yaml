# ==============================================================================
# RAG Layer - 子Chart配置 (rag-*)
# ==============================================================================
rag-memory:
  enabled: true
  name: memory
  image:
    repository: registry.example.com/sk-agent/memory
    tag: "latest"
  mysql:
    database: "memory"
    user: "memoryuser"
    password: "memory123"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/memory"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

rag-milvus:
  enabled: true
  name: milvus
  image:
    repository: milvusdb/milvus
    tag: "v2.3.3"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "manual-sc"
  service:
    type: ClusterIP
    port: 19530
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 16Gi

rag-services:
  enabled: true
  name: rag-services
  image:
    repository: registry.example.com/sk-agent/rag-services
    tag: "latest"
  mysql:
    database: "rag"
    user: "raguser"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi