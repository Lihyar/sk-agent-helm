# RabbitMQ Configuration
rabbitmq:
  # RabbitMQ user
  user: admin
  # RabbitMQ password
  password: rabbitmq123
  # Erlang cookie (auto-generated if empty)
  erlangCookie: ""
  # RabbitMQ Image Configuration
  image:
    repository: rabbitmq
    tag: "3.13-management"
    pullPolicy: IfNotPresent

# ARM RabbitMQ Image Configuration
rabbitmq_arm:
  image:
    repository: arm64v8/rabbitmq
    tag: "3.13-management"
    pullPolicy: IfNotPresent

# Persistence Configuration
persistence:
  enabled: true
  # Requested storage size
  size: 8Gi
  # Note: For Docker Desktop, use /tmp path
  hostPath: "/Users/haiyan/Documents/SK_K8S/sk-agent-3/volumes/rabbitmq"
  # Access mode
  accessMode: ReadWriteOnce

# Service Configuration
service:
  type: ClusterIP
  port: 5672
  targetPort: 5672
  managementPort: 15672
  # Enable headless service for StatefulSet
  headless: false
  # Annotations for service
  annotations: {}

# Resource Configuration
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Node selector
nodeSelector:
  kubernetes.io/arch: "amd64"

tolerations: []
affinity: {}

# Security Context
securityContext:
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Health check configuration
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# RabbitMQ configuration
rabbitmqConfig:
  # Memory high watermark (relative)
  memoryHighWatermark: "0.6"
  # Disk free limit
  diskFreeLimit: "1GB"
  # Log level (info, warning, error)
  logLevel: "info"

# Environment variables (additional)
extraEnv: []

# Additional volumes
extraVolumes: []
extraVolumeMounts: []

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: "sk-agent-account"

# Ingress configuration (optional)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: rabbitmq.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
