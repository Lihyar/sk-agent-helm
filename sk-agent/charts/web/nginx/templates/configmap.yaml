apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx.fullname" . }}-config
  labels:
    {{- include "nginx.labels" . | nindent 4 }}
data:
  default.conf: |-
    upstream app-web {
      server {{ index .Values.upstream "app-web" "host" }}:{{ index .Values.upstream "app-web" "port" }};
    }

    upstream hospital-web {
      server {{ index .Values.upstream "hospital-web" "host" }}:{{ index .Values.upstream "hospital-web" "port" }};
    }

    server {
      listen 80;
      server_name localhost;

      location / {
        proxy_pass http://app-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/ {
        proxy_pass http://app-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /hospital/ {
        proxy_pass http://hospital-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }