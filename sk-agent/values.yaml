# Web Layer Configuration
web:
  enabled: true
  
  appWeb:
    enabled: true
    name: app-web
    image:
      repository: registry.example.com/sk-agent/app-web
      tag: "latest"
    replicas: 1
    service:
      type: ClusterIP
      port: 3000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  
  hospitalWeb:
    enabled: true
    name: hospital-web
    image:
      repository: registry.example.com/sk-agent/hospital-web
      tag: "latest"
    replicas: 1
    service:
      type: ClusterIP
      port: 3000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  
  nginx:
    enabled: true
    name: nginx
    image:
      repository: nginx
      tag: "alpine"
    replicas: 1
    config:
      appWebUpstream: "app-web:3000"
      hospitalWebUpstream: "hospital-web:3000"
    service:
      type: LoadBalancer
      port: 80
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Node selector
nodeSelector:
  kubernetes.io/arch: "amd64"

tolerations: []

affinity: {}

# Security Context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sk-agent.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sk-agent-tls
      hosts:
        - sk-agent.local
