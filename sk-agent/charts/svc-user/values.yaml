name: user
image:
  repository: registry.example.com/sk-agent/user
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8080
replicas: 1
javaOpts: "-Xms512m -Xmx1g -Xmn256m"
config:
  spring:
    application:
      name: user-service
    datasource:
      url: jdbc:mysql://mysql:3306/skagent?useUnicode=true&characterEncoding=utf8&useSSL=false
      username: skuser
      password: mysql123
      driver-class-name: com.mysql.cj.jdbc.Driver
    redis:
      host: redis
      port: 6379
    rabbitmq:
      host: rabbitmq
      port: 5672
  server:
    port: 8080
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi