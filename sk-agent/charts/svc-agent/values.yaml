name: agent
image:
  repository: registry.example.com/sk-agent/agent
  tag: latest
  pullPolicy: IfNotPresent
command:
  - python
  - -m
  - agent.service
service:
  type: ClusterIP
  port: 8080
replicas: 1
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi
