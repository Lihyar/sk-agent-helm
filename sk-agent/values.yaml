# ==============================================================================
# SK Agent Microservices Architecture - Parent Chart Configuration
# Version 3: 折中方案 - 保留子Chart结构 + 复用公共模板
# ==============================================================================

# Global settings
global:
  environment: dev
  architecture: amd64
  imagePullSecrets:
    - name: registry-secret
  storageClass: "manual-sc"
  serviceAccount:
    create: true
    name: "sk-agent-account"
  domain: "cluster.local"

# Private Registry
registry:
  enabled: true
  server: "registry.example.com"
  username: ""
  password: ""
  email: ""

# ==============================================================================
# Infrastructure Layer - 子Chart配置 (infra-*)
# ==============================================================================
infra-mysql:
  enabled: true
  name: mysql
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  database: skagent
  user: skuser
  password: "mysql123"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/mysql"
  service:
    type: ClusterIP
    port: 3306
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

infra-redis:
  enabled: true
  name: redis
  image:
    repository: redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  password: "redis123"
  persistence:
    enabled: true
    size: 2Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/redis"
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

infra-rabbitmq:
  enabled: true
  name: rabbitmq
  image:
    repository: rabbitmq
    tag: "3.13-management"
    pullPolicy: IfNotPresent
  user: admin
  password: "rabbitmq123"
  persistence:
    enabled: true
    size: 8Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/rabbitmq"
  service:
    type: ClusterIP
    port: 5672
    managementPort: 15672
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

infra-minio:
  enabled: true
  name: minio
  image:
    repository: minio/minio
    tag: "latest"
    pullPolicy: IfNotPresent
  accessKey: "minioadmin"
  secretKey: "minioadmin123"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/minio"
  service:
    type: ClusterIP
    port: 9000
    consolePort: 9001
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# ==============================================================================
# RAG Layer - 子Chart配置 (rag-*)
# ==============================================================================
rag-memory:
  enabled: true
  name: memory
  image:
    repository: registry.example.com/sk-agent/memory
    tag: "latest"
  mysql:
    database: "memory"
    user: "memoryuser"
    password: "memory123"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "manual-sc"
    hostPath: "/tmp/volumes/memory"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

rag-milvus:
  enabled: true
  name: milvus
  image:
    repository: milvusdb/milvus
    tag: "v2.3.3"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "manual-sc"
  service:
    type: ClusterIP
    port: 19530
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 16Gi

rag-services:
  enabled: true
  name: rag-services
  image:
    repository: registry.example.com/sk-agent/rag-services
    tag: "latest"
  mysql:
    database: "rag"
    user: "raguser"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

