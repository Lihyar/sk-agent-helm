name: mysql
image:
  repository: mysql
  tag: "8.0"
  pullPolicy: IfNotPresent
service:
  port: 3306
env:
  - name: MYSQL_ROOT_PASSWORD
    value: "rootpass"
  - name: MYSQL_DATABASE
    value: "skagent"
volumes:
  - name: data
    mountPath: /var/lib/mysql
    size: 10Gi
    storageClass: manual-sc
    initCommand: "mkdir -p /var/lib/mysql && chown -R 999:999 /var/lib/mysql"
  - name: conf
    mountPath: /etc/mysql/conf.d
    size: 1Gi
    storageClass: manual-sc
    readOnly: true
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi