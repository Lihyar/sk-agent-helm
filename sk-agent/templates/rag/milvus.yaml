{{- if and .Values.rag.enabled .Values.rag.milvus.enabled -}}
{{- $svc := .Values.rag.milvus -}}
{{- $fullName := printf "%s-milvus" (include "sk-agent.fullname" .) -}}
{{- $arch := .Values.global.architecture | default "amd64" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-secret
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
type: Opaque
data:
  minio-access-key: {{ $svc.minio.accessKey | default "minioadmin" | b64enc | quote }}
  minio-secret-key: {{ $svc.minio.secretKey | default "minioadmin" | b64enc | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-config
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
data:
  milvus.yaml: |
    etcd:
      endpoints:
        - {{ $fullName }}-etcd:2379
      rootPath: milvus/
      metaSubPath: meta/
      kvSubPath: kv/
    
    storage:
      type: minio
      endpoint: {{ $fullName }}-minio:9000
      accessKeyID: {{ $svc.minio.accessKey | default "minioadmin" }}
      secretAccessKey: {{ $svc.minio.secretKey | default "minioadmin" }}
      useSSL: false
      bucketName: milvus-bucket
    
    log:
      level: info
      format: text
    
    grpc:
      serverPort: 19530
      webPort: 9091
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
    component: milvus
spec:
  serviceName: {{ $fullName }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "sk-agent.selectorLabels" . | nindent 6 }}
      app: milvus
  template:
    metadata:
      labels:
        {{- include "sk-agent.selectorLabels" . | nindent 8 }}
        app: milvus
    spec:
      {{- include "sk-agent.imagePullSecret" . | nindent 6 }}
      serviceAccountName: {{ include "sk-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: milvus
          {{- if eq $arch "arm64" }}
          image: "milvusdb/milvus:{{ $svc.image.tag | default "v2.3.3" }}"
          {{- else }}
          image: "{{ $svc.image.repository | default "milvusdb/milvus" }}:{{ $svc.image.tag | default "v2.3.3" }}"
          {{- end }}
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: milvus
              containerPort: 19530
              protocol: TCP
            - name: milvus-web
              containerPort: 9091
              protocol: TCP
          env:
            - name: ETCD_ENDPOINTS
              value: "{{ $fullName }}-etcd:2379"
            - name: MINIO_ADDRESS
              value: "{{ $fullName }}-minio:9000"
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
            - name: milvus-config
              mountPath: /milvus/configs
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: milvus
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: milvus
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
      volumes:
        - name: milvus-config
          configMap:
            name: {{ $fullName }}-config
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: milvus-data
      spec:
        accessModes:
          - {{ $svc.persistence.accessMode | default "ReadWriteOnce" }}
        storageClassName: {{ $svc.persistence.storageClass | default "manual-sc" }}
        resources:
          requests:
            storage: {{ $svc.persistence.size | default "10Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 19530
      targetPort: milvus
      protocol: TCP
      name: milvus
    - port: 9091
      targetPort: milvus-web
      protocol: TCP
      name: milvus-web
  selector:
    app: milvus
---
{{- end }}
