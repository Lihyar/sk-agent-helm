{{- if and .Values.infra.enabled .Values.infra.redis.enabled -}}
{{- $svc := .Values.infra.redis -}}
{{- $fullName := printf "%s-redis" (include "sk-agent.fullname" .) -}}
{{- $arch := .Values.global.architecture | default "amd64" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-secret
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
type: Opaque
data:
  redis-password: {{ $svc.password | b64enc | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-config
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    protected-mode no
    appendonly yes
    dir /data
    {{- if $svc.password }}
    requirepass {{ $svc.password }}
    {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
    component: redis
spec:
  serviceName: {{ $fullName }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "sk-agent.selectorLabels" . | nindent 6 }}
      app: redis
  template:
    metadata:
      labels:
        {{- include "sk-agent.selectorLabels" . | nindent 8 }}
        app: redis
    spec:
      {{- include "sk-agent.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sk-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: redis
          {{- if eq $arch "arm64" }}
          image: "arm64v8/redis:{{ $svc.image.tag | default "7.2-alpine" }}"
          {{- else }}
          image: "{{ $svc.image.repository | default "redis" }}:{{ $svc.image.tag | default "7.2-alpine" }}"
          {{- end }}
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - /usr/local/etc/redis/redis.conf
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secret
                  key: redis-password
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /usr/local/etc/redis
              readOnly: true
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ $fullName }}-config
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if $svc.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ $svc.persistence.accessMode | default "ReadWriteOnce" }}
        storageClassName: {{ $svc.persistence.storageClass | default "manual-sc" }}
        resources:
          requests:
            storage: {{ $svc.persistence.size | default "2Gi" }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sk-agent.labels" . | nindent 4 }}
spec:
  type: {{ $svc.service.type | default "ClusterIP" }}
  ports:
    - port: {{ $svc.service.port | default 6379 }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app: redis
{{- end }}