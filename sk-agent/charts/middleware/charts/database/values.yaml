# Global database settings
nameOverride: ""
fullnameOverride: ""

# Enable/disable the database chart
enabled: true

# Database type selection: mysql, postgresql, kingbase
database:
  type: mysql

# MySQL Configuration
mysql:
  enabled: true
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  service:
    port: 3306
  env:
    - name: MYSQL_ROOT_PASSWORD
      value: "rootpass"
    - name: MYSQL_DATABASE
      value: "skagent"
    - name: MYSQL_USER
      value: "skuser"
    - name: MYSQL_PASSWORD
      value: "skpass"
  volumes:
    - name: data
      mountPath: /var/lib/mysql
      size: 10Gi
      storageClass: manual-sc
      initCommand: "mkdir -p /var/lib/mysql && chown -R 999:999 /var/lib/mysql"
    - name: conf
      mountPath: /etc/mysql/conf.d
      size: 1Gi
      storageClass: manual-sc
      readOnly: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# PostgreSQL Configuration
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  env:
    - name: POSTGRES_USER
      value: "postgres"
    - name: POSTGRES_PASSWORD
      value: "postgres"
    - name: POSTGRES_DB
      value: "skagent"
  volumes:
    - name: data
      mountPath: /var/lib/postgresql/data
      size: 10Gi
      storageClass: manual-sc
      initCommand: "mkdir -p /var/lib/postgresql/data && chown -R 70:70 /var/lib/postgresql/data"
    - name: conf
      mountPath: /etc/postgresql/conf.d
      size: 1Gi
      storageClass: manual-sc
      readOnly: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# Kingbase Configuration (人大金仓)
kingbase:
  enabled: true
  image:
    repository: kingbase
    tag: "V8"
    pullPolicy: IfNotPresent
  service:
    port: 54321
  env:
    - name: KINGBASE_USER
      value: "system"
    - name: KINGBASE_PASSWORD
      value: "system"
    - name: KINGBASE_DATABASE
      value: "skagent"
  volumes:
    - name: data
      mountPath: /opt/kingbase/data
      size: 10Gi
      storageClass: manual-sc
      initCommand: "mkdir -p /opt/kingbase/data && chown -R 1000:1000 /opt/kingbase/data"
    - name: conf
      mountPath: /opt/kingbase/conf
      size: 1Gi
      storageClass: manual-sc
      readOnly: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
