# ==============================================================================
# Web Layer - 子Chart配置 (web-*)
# ==============================================================================
web-app:
  enabled: true
  name: app-web
  image:
    repository: registry.example.com/sk-agent/app-web
    tag: "latest"
  replicas: 1
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

web-hospital:
  enabled: true
  name: hospital-web
  image:
    repository: registry.example.com/sk-agent/hospital-web
    tag: "latest"
  replicas: 1
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

web-nginx:
  enabled: true
  name: nginx
  image:
    repository: nginx
    tag: "alpine"
  replicas: 1
  config:
    appWebUpstream: "app-web:3000"
    hospitalWebUpstream: "hospital-web:3000"
  service:
    type: LoadBalancer
    port: 80
  ingress:
    enabled: false
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: "api.sk-agent.com"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: sk-agent-tls
        hosts:
          - "api.sk-agent.com"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ==============================================================================
# Global Settings
# ==============================================================================
nodeSelector:
  kubernetes.io/arch: "amd64"

tolerations: []

affinity: {}

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

podAnnotations: {}

podLabels: {}

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sk-agent.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sk-agent-tls
      hosts:
        - sk-agent.local