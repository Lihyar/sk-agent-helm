# Development Environment Configuration (V4)
# Usage: helm install sk-agent-dev sk-agent -f values-dev.yaml

global:
  environment: dev
  architecture: amd64
  database: mysql
  storageClass: "manual-sc"
  imagePullSecrets:
    - name: registry-secret
  serviceAccount:
    create: true
    name: "sk-agent-account"

registry:
  enabled: true
  server: "saascr.shukun.net"
  username: ""
  password: ""

# ==============================================================================
# L2: Middleware Layer - 开发环境覆盖配置
# ==============================================================================
middleware:
  enabled: true
  mysql:
    enabled: true
    persistence:
      size: 5Gi
      hostPath: "/tmp/volumes/mysql-dev"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  redis:
    enabled: true
    persistence:
      size: 1Gi
      hostPath: "/tmp/volumes/redis-dev"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
  rabbitmq:
    enabled: true
    persistence:
      size: 4Gi
      hostPath: "/tmp/volumes/rabbitmq-dev"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  minio:
    enabled: true
    persistence:
      size: 10Gi
      hostPath: "/tmp/volumes/minio-dev"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

# ==============================================================================
# L2: Data Service Layer - 开发环境覆盖配置
# ==============================================================================
data-service:
  enabled: true
  memory:
    enabled: true
  milvus:
    enabled: true
  rag-services:
    enabled: true

# ==============================================================================
# L2: Model Service Layer - 开发环境覆盖配置
# ==============================================================================
model-service:
  enabled: false

# ==============================================================================
# L2: Common Service Layer - 开发环境覆盖配置
# ==============================================================================
common-service:
  enabled: true
  user:
    enabled: true
  domain:
    enabled: true
  etl:
    enabled: true
  storage:
    enabled: true
  notification:
    enabled: true
  operation:
    enabled: true

# ==============================================================================
# L2: Medical Brain Layer - 开发环境覆盖配置
# ==============================================================================
medical-brain:
  enabled: true
  agent:
    enabled: true
  agent-task:
    enabled: true
  scheduler:
    enabled: true

# ==============================================================================
# L2: Business Service Layer - 开发环境覆盖配置
# ==============================================================================
biz-service:
  enabled: true
  assessment:
    enabled: true
  dashboard:
    enabled: true
  hospital:
    enabled: true
  tcm:
    enabled: true
  customer:
    enabled: true

# ==============================================================================
# L2: Gateway Layer - 开发环境覆盖配置
# ==============================================================================
gateway:
  enabled: true
  manager:
    enabled: true
  nginx:
    enabled: true
    service:
      type: NodePort
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      hosts:
        - host: sk-agent-dev.local
          paths:
            - path: /
              pathType: Prefix
      tls: []
  app-web:
    enabled: true
    replicas: 1
  hospital-web:
    enabled: true
    replicas: 1

# ==============================================================================
# Global Ingress Configuration
# ==============================================================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: sk-agent-dev.local
      paths:
        - path: /
          pathType: Prefix
