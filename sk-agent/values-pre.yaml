# Pre-Production Environment Configuration (V4)
# Usage: helm install sk-agent-pre sk-agent -f values-pre.yaml

global:
  environment: pre
  architecture: amd64
  database: mysql
  storageClass: "standard"
  imagePullSecrets:
    - name: registry-secret
  serviceAccount:
    create: true
    name: "sk-agent-account"

registry:
  enabled: true
  server: "saascr.shukun.net"
  username: ""
  password: ""

# ==============================================================================
# L2: Middleware Layer - Pre-prod settings
# ==============================================================================
middleware:
  enabled: true
  mysql:
    enabled: true
    persistence:
      size: 20Gi
      storageClass: "standard"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  redis:
    enabled: true
    persistence:
      size: 5Gi
      storageClass: "standard"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  rabbitmq:
    enabled: true
    persistence:
      size: 10Gi
      storageClass: "standard"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  minio:
    enabled: true
    persistence:
      size: 50Gi
      storageClass: "standard"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

# ==============================================================================
# L2: Data Service Layer - Pre-prod settings
# ==============================================================================
data-service:
  enabled: true
  memory:
    enabled: true
    persistence:
      size: 10Gi
  milvus:
    enabled: true
    persistence:
      size: 50Gi
  rag-services:
    enabled: true

# ==============================================================================
# L2: Model Service Layer - Pre-prod settings
# ==============================================================================
model-service:
  enabled: false

# ==============================================================================
# L2: Common Service Layer - Pre-prod settings
# ==============================================================================
common-service:
  enabled: true
  user:
    enabled: true
  domain:
    enabled: true
  etl:
    enabled: true
  storage:
    enabled: true
  notification:
    enabled: true
  operation:
    enabled: true

# ==============================================================================
# L2: Medical Brain Layer - Pre-prod settings
# ==============================================================================
medical-brain:
  enabled: true
  agent:
    enabled: true
  agent-task:
    enabled: true
  scheduler:
    enabled: true

# ==============================================================================
# L2: Business Service Layer - Pre-prod settings
# ==============================================================================
biz-service:
  enabled: true
  assessment:
    enabled: true
  dashboard:
    enabled: true
  hospital:
    enabled: true
  tcm:
    enabled: true
  customer:
    enabled: true

# ==============================================================================
# L2: Gateway Layer - Pre-prod settings
# ==============================================================================
gateway:
  enabled: true
  manager:
    enabled: true
  nginx:
    enabled: true
    replicas: 2
    service:
      type: LoadBalancer
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-staging"
        nginx.ingress.kubernetes.io/rewrite-target: /
      hosts:
        - host: sk-agent-pre.example.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: sk-agent-pre-tls
          hosts:
            - sk-agent-pre.example.com
  app-web:
    enabled: true
    replicas: 2
  hospital-web:
    enabled: true
    replicas: 2

# ==============================================================================
# Global Settings
# ==============================================================================
nodeSelector:
  kubernetes.io/arch: "amd64"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: sk-agent-pre.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sk-agent-pre-tls
      hosts:
        - sk-agent-pre.example.com
