# Source: sk-agent/charts/rag-memory/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory
  labels:
    helm.sh/chart: rag-memory-0.1.0
    app.kubernetes.io/name: rag-memory
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    layer: platform-services
    language: java
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-memory
      app.kubernetes.io/instance: release-name
      app: memory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-memory
        app.kubernetes.io/instance: release-name
        app: memory
        layer: platform-services
    spec:
      
      imagePullSecrets:
        - name: registry-secret
      serviceAccountName: sk-agent-account
      securityContext:
        null
      containers:
        - name: memory
          image: "registry.example.com/sk-agent/memory:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
---
