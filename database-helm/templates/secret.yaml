apiVersion: v1
kind: Secret
metadata:
  name: {{ include "database.fullname" . }}-secret
  labels:
    {{- include "database.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded password
  database-password: {{ .Values.database.password | default "changeme" | b64enc }}
  
  # Root password for MySQL
  {{- if eq .Values.database.type "mysql" }}
  mysql-root-password: {{ .Values.mysql.rootPassword | default "rootpassword" | b64enc }}
  {{- end }}
  
  # SSL certificates (if enabled)
  {{- if .Values.database.sslEnabled }}
  {{- if .Values.database.ssl.caCert }}
  ssl-ca-cert: {{ .Values.database.ssl.caCert | b64enc }}
  {{- end }}
  {{- if .Values.database.ssl.serverCert }}
  ssl-server-cert: {{ .Values.database.ssl.serverCert | b64enc }}
  {{- end }}
  {{- if .Values.database.ssl.serverKey }}
  ssl-server-key: {{ .Values.database.ssl.serverKey | b64enc }}
  {{- end }}
  {{- end }}